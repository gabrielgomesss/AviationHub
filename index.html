<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aviation Hub</title>
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="./assets/style.css">
    
    <!-- Leaflet para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Import Map: Define os apelidos para os módulos do Firebase -->
<script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
        "firebase/functions": "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js"
      }
    }
    </script>
</head>
<body class="glass-theme">

    <!-- Div Principal onde o Router injetará as Views -->
    <div id="app-viewport"></div>

    <!-- Scripts com type module para suporte a import/export[cite: 6] -->
    <script type="module" src="./src/app.js"></script>
    
</body>
</html>
